<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Money CEO – Transactions</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Navigation bar -->
  <nav class="navbar">
    <div class="nav-left">Money CEO</div>
    <div class="nav-right">
      <a href="index.html" class="nav-link">Dashboard</a>
      <a href="transactions.html" class="nav-link active">Transactions</a>
      <a href="budgets.html" class="nav-link">Budgets</a>
      <a href="goals.html" class="nav-link">Goals</a>
      <a href="debts.html" class="nav-link">Debts</a>
      <a href="reports.html" class="nav-link">Reports</a>
    </div>
  </nav>

  <main class="container">
    <h1 class="page-title">Transactions</h1>
    <!-- Form to add a transaction -->
    <form id="transactionForm" class="form" onsubmit="handleTransactionSubmit(event)">
      <div class="form-row">
        <label for="date">Date</label>
        <input type="date" id="date" required>
      </div>
      <div class="form-row">
        <label for="description">Description</label>
        <input type="text" id="description" placeholder="e.g. Salary" required>
      </div>
      <div class="form-row">
        <label for="amount">Amount (KES)</label>
        <input type="number" id="amount" step="0.01" required>
      </div>
      <div class="form-row">
        <label for="type">Type</label>
        <select id="type" required>
          <option value="income">Income</option>
          <option value="expense">Expense</option>
        </select>
      </div>
      <button type="submit" class="btn-submit">Add Transaction</button>
    </form>

    <!-- Transactions table -->
    <table class="transactions-table">
      <thead>
        <tr>
          <th>Date</th>
          <th>Description</th>
          <th>Type</th>
          <th>Amount (KES)</th>
        </tr>
      </thead>
      <tbody id="transactionsList">
        <!-- Transactions will be injected here -->
      </tbody>
    </table>
  </main>

  <script src="script.js"></script>
  <script>
    // Initialize transaction list on page load
    document.addEventListener('DOMContentLoaded', renderTransactionsList);

    // Handler for transaction form submission
    function handleTransactionSubmit(event) {
      event.preventDefault();
      const date = document.getElementById('date').value;
      const description = document.getElementById('description').value.trim();
      const amount = parseFloat(document.getElementById('amount').value);
      const type = document.getElementById('type').value;
      // Validate inputs
      if (!date || !description || isNaN(amount)) {
        alert('Please fill in all fields correctly.');
        return;
      }
      addTransaction({ date, description, amount, type });
      // Clear inputs
      document.getElementById('transactionForm').reset();
      // Re-render list
      renderTransactionsList();
    }
  </script>
</body>
</html>
