<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Money CEO – Dashboard</title>
  <!-- Link our shared stylesheet -->
  <link rel="stylesheet" href="styles.css">
  <!-- Import Google Font for a modern look -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <!-- Chart.js CDN for simple charts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <!-- Top navigation bar -->
  <nav class="navbar">
    <div class="nav-left">Money CEO</div>
    <div class="nav-right">
      <a href="index.html" class="nav-link active">Dashboard</a>
      <a href="transactions.html" class="nav-link">Transactions</a>
      <a href="budgets.html" class="nav-link">Budgets</a>
      <a href="goals.html" class="nav-link">Goals</a>
      <a href="debts.html" class="nav-link">Debts</a>
      <a href="reports.html" class="nav-link">Reports</a>
    </div>
  </nav>

  <!-- Main container -->
  <main class="container">
    <!-- KPI cards -->
    <section class="kpi-grid">
      <div class="kpi-card">
        <span class="kpi-label">Total Income</span>
        <span id="totalIncome" class="kpi-value income">KSh 0</span>
      </div>
      <div class="kpi-card">
        <span class="kpi-label">Total Expenses</span>
        <span id="totalExpenses" class="kpi-value expense">KSh 0</span>
      </div>
      <div class="kpi-card">
        <span class="kpi-label">Savings</span>
        <span id="savings" class="kpi-value savings">KSh 0</span>
      </div>
      <div class="kpi-card">
        <span class="kpi-label">Savings Rate</span>
        <span id="savingsRate" class="kpi-value">0%</span>
      </div>
    </section>

    <!-- Chart panel -->
    <section class="chart-panel">
      <h2 class="chart-title">Income vs Expenses</h2>
      <canvas id="incomeExpenseChart" width="400" height="200"></canvas>
    </section>

    <!-- Disclaimer -->
    <p class="note">Disclaimer: Money CEO is an educational tool. It does not provide financial, legal, tax or investment advice. Use at your own risk.</p>
  </main>

  <!-- Shared script functions -->
  <script src="script.js"></script>
  <script>
    // When the dashboard loads, render KPIs and the chart
    document.addEventListener('DOMContentLoaded', () => {
      renderKPIs();
      drawIncomeExpenseChart();
    });
  </script>
</body>
</html>
