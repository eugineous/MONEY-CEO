<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Money CEO – Login</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <div class="nav-left">Money CEO</div>
    <div class="nav-right">
      <a href="index.html" class="nav-link">Dashboard</a>
      <a href="transactions.html" class="nav-link">Transactions</a>
      <a href="budgets.html" class="nav-link">Budgets</a>
      <a href="goals.html" class="nav-link">Goals</a>
      <a href="debts.html" class="nav-link">Debts</a>
      <a href="reports.html" class="nav-link">Reports</a>
      <a href="login.html" class="nav-link active">Login</a>
    </div>
  </nav>
  <main class="container">
    <h1 class="page-title">Login</h1>
    <form id="loginForm" class="form" onsubmit="handleLogin(event)">
      <div class="form-row">
        <label for="username">Username</label>
        <input type="text" id="username" required placeholder="Enter username">
      </div>
      <div class="form-row">
        <label for="password">Password</label>
        <input type="password" id="password" required placeholder="Enter password">
      </div>
      <button type="submit" class="btn-submit">Login</button>
      <p id="loginError" style="color: var(--accent); margin-top: 8px; display: none;">Invalid credentials.</p>
    </form>
    <p class="note">For demo purposes, you can login with <code>admin / admin123</code>.</p>
  </main>
  <script src="script.js"></script>
  <script>
    function handleLogin(event) {
      event.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      // Very simple credentials check for demonstration
      if (username === 'admin' && password === 'admin123') {
        localStorage.setItem('moneyceo_logged_in', 'true');
        // Redirect to dashboard
        window.location.href = 'index.html';
      } else {
        document.getElementById('loginError').style.display = 'block';
      }
    }
  </script>
</body>
</html>
